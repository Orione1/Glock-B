<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOCK B | Skill-Based Arena</title>
    <style>
        :root { --red: #ff0000; --gold: #ffcc00; --bg: #0a0a0a; --card: #151515; --green: #00ff41; }
        body { background: var(--bg); color: #fff; font-family: 'Impact', sans-serif; margin: 0; text-transform: uppercase; }
        .page { display: none; padding: 20px; padding-bottom: 100px; }
        .page.active { display: block; }
        .btn-main { width: 100%; background: var(--red); color: #fff; border: none; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        input, select { width: 100%; background: #222; border: 1px solid #444; color: var(--green); padding: 15px; margin-bottom: 10px; box-sizing: border-box; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--red); }
        .nav-item { color: #888; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--red); }
        .salon-card { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        /* Style spécial Quiz */
        #quiz-zone { display: none; text-align: center; background: var(--card); padding: 20px; border-radius: 10px; border: 2px solid var(--red); }
        .opt-btn { background: #222; color: #fff; border: 1px solid #444; padding: 15px; width: 100%; margin-bottom: 10px; border-radius: 5px; font-family: 'Impact'; text-transform: uppercase; cursor: pointer; }
        .opt-btn:active { background: var(--red); }
    </style>
</head>
<body>

    <div id="auth-page" class="page active">
        <h1 style="text-align:center; color:var(--red); letter-spacing:5px;">GLOCK B</h1>
        <input type="email" id="email" placeholder="EMAIL">
        <input type="password" id="password" placeholder="MOT DE PASSE">
        <input type="text" id="ref-code" placeholder="CODE PARRAIN (OPTIONNEL)">
        <button class="btn-main" onclick="auth('login')">CONNEXION</button>
        <button class="btn-main" style="background:#333" onclick="auth('register')">INSCRIPTION</button>
    </div>

    <div id="main-app" style="display:none;">
        <div id="combat" class="page active">
            <div id="lobby-ui">
                <div style="background:var(--card); padding:15px; border-radius:10px; margin-bottom:20px;">
                    <div style="display:flex; justify-content:space-between"><span>SOLDE:</span> <span id="u-bal" style="color:var(--gold)">0 XOF</span></div>
                    <div style="font-size:12px; margin-top:10px;">MISÉ: <span id="u-wag">0</span> / <span id="u-req" style="color:var(--red)">0</span> XOF (70%)</div>
                </div>
                <input type="number" id="bet-amt" placeholder="MISE (100 - 100k)">
                <div class="salon-card" onclick="join(1, 3)"><span>DUEL 1V1 (3 Q)</span> <span style="color:var(--red)">MISE</span></div>
                <div class="salon-card" onclick="join(5, 5)"><span>BR 5 JOUEURS (5 Q)</span> <span style="color:var(--red)">MISE</span></div>
                <div class="salon-card" onclick="join(50, 15)"><span>SURVIVOR 50 (15 Q)</span> <span style="color:var(--red)">MISE</span></div>
            </div>

            <div id="quiz-zone">
                <h3 id="quiz-header" style="color:var(--gold)">QUESTION 1</h3>
                <p id="q-text" style="font-size: 20px; margin-bottom: 20px;"></p>
                <div id="options-container"></div>
                <p style="margin-top:20px; font-size:12px;">SCORE : <span id="live-score">0</span></p>
            </div>
        </div>

        <div id="depot" class="page">
            <h2>DÉPÔT (MIN 600)</h2>
            <input type="number" id="depot-amt" placeholder="MONTANT">
            <button class="btn-main" onclick="startDepot()">PAYER VIA MONEY FUSION</button>
        </div>

        <div id="retrait" class="page">
            <h2>RETRAIT</h2>
            <select id="ret-meth"><option value="mobile">MOBILE MONEY (1000)</option><option value="crypto">CRYPTO (6000)</option></select>
            <input type="number" id="ret-val" placeholder="MONTANT">
            <button class="btn-main" onclick="requestWithdrawal()">RETIRER</button>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="showP('combat', this)">COMBAT</div>
            <div class="nav-item" onclick="showP('depot', this)">DÉPÔT</div>
            <div class="nav-item" onclick="showP('retrait', this)">RETRAIT</div>
        </div>
    </div>

    <script>
        const API = "https://glockb.onrender.com"; 
        let userId = localStorage.getItem('glock_uid');

        // BANQUE DE QUESTIONS (Exemple)
        const allQuestions = [
            { q: "Capitale du Burkina Faso ?", r: "Ouagadougou", o: ["Bobo", "Ouagadougou", "Koudougou"] },
            { q: "Symbole de l'or ?", r: "Au", o: ["Ag", "Fe", "Au"] },
            { q: "Fondateur de l'Empire Mandingue ?", r: "Soundiata Keïta", o: ["Samory Touré", "Soundiata Keïta", "Mansa Moussa"] },
            { q: "Monnaie du Nigeria ?", r: "Naira", o: ["CFA", "Naira", "Cedi"] },
            { q: "Planète la plus proche du Soleil ?", r: "Mercure", o: ["Mars", "Vénus", "Mercure"] }
        ];

        let gameQuestions = [];
        let currentIdx = 0;
        let score = 0;

        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const referrer = document.getElementById('ref-code').value;
            if(!email || !password) return alert("Champs vides !");
            try {
                const res = await fetch(`${API}/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password, referrer})
                });
                const data = await res.json();
                if(data.success) { localStorage.setItem('glock_uid', data.user_id); location.reload(); }
                else { alert(data.error); }
            } catch(e) { alert("Erreur serveur"); }
        }

        async function loadProfile() {
            if(!userId) return;
            document.getElementById('auth-page').classList.remove('active');
            document.getElementById('main-app').style.display = 'block';
            try {
                const res = await fetch(`${API}/get_profile?id=${userId}`);
                const d = await res.json();
                document.getElementById('u-bal').innerText = d.balance + " XOF";
                document.getElementById('u-wag').innerText = d.wagered;
                document.getElementById('u-req').innerText = d.required.toFixed(0);
            } catch(e) { }
        }

        function join(mode, numQ) {
            const amount = document.getElementById('bet-amt').value;
            if(!amount || amount < 100) return alert("Mise minimum 100 XOF");

            // Simulation de validation serveur avant le quiz
            fetch(`${API}/place_bet`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: userId, amount})
            }).then(res => res.json()).then(d => {
                if(d.success) {
                    initQuiz(numQ);
                } else { alert(d.error); }
            });
        }

        function initQuiz(numQ) {
            document.getElementById('lobby-ui').style.display = 'none';
            document.getElementById('quiz-zone').style.display = 'block';
            gameQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, numQ);
            currentIdx = 0;
            score = 0;
            displayQuestion();
        }

        function displayQuestion() {
            if(currentIdx >= gameQuestions.length) {
                return finishGame();
            }
            const q = gameQuestions[currentIdx];
            document.getElementById('quiz-header').innerText = `QUESTION ${currentIdx + 1} / ${gameQuestions.length}`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('live-score').innerText = score;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.o.forEach(opt => {
                const b = document.createElement('button');
                b.className = "opt-btn";
                b.innerText = opt;
                b.onclick = () => {
                    if(opt === q.r) score++;
                    currentIdx++;
                    displayQuestion();
                };
                container.appendChild(b);
            });
        }

        async function finishGame() {
            document.getElementById('quiz-zone').innerHTML = "<h2>Analyse des résultats mondiaux...</h2>";
            
            // On envoie le score final au serveur
            const res = await fetch(`${API}/submit_score`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: userId, score: score, total: gameQuestions.length})
            });
            const d = await res.json();
            
            // Logique de retour selon le résultat
            if(d.result === "win") {
                alert(`VICTOIRE ! Tu as trouvé ${score}/${gameQuestions.length}. Gain crédité !`);
            } else if(d.result === "draw") {
                alert("MATCH NUL ! Relance d'un nouveau quiz...");
                location.reload(); 
            } else {
                alert("YOU LOOSE ! Ton score n'était pas suffisant pour rester en lice.");
            }
            location.reload();
        }

        function showP(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function startDepot() { alert("Lien Money Fusion en attente d'homologation."); }
        function requestWithdrawal() { alert("Vérification des conditions de mise en cours..."); }

        if(userId) loadProfile();
    </script>
</body>
</html>
